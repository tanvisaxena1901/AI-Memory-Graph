global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080

  - job_name: telemetry-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - telemetry-service:8081

  - job_name: otel-collector
    static_configs:
      - targets:
          - otel-collector:8888

  - job_name: otel-demo-signals
    static_configs:
      - targets:
          - otel-collector:9464
