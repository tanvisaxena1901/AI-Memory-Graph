services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  opensearch:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: "AegisAdmin1!"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  neo4j:
    image: neo4j:5.25
    environment:
      NEO4J_AUTH: neo4j/aegis-password
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  ai-engine:
    build:
      context: ../../ai-engine-python
      dockerfile: Dockerfile
    environment:
      AEGIS_OPENSEARCH_URL: http://opensearch:9200
      AEGIS_NEO4J_URI: bolt://neo4j:7687
      AEGIS_NEO4J_USER: neo4j
      AEGIS_NEO4J_PASSWORD: aegis-password
    ports:
      - "8000:8000"
    depends_on:
      - opensearch
      - neo4j

  telemetry-service:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.telemetry-service
    ports:
      - "8081:8081"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ../otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      - telemetry-service

  api-gateway:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api-gateway
    environment:
      POSTGRES_R2DBC_URL: r2dbc:postgresql://postgres:5432/aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      AI_ENGINE_BASE_URL: http://ai-engine:8000
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ai-engine

volumes:
  postgres-data:
  opensearch-data:
  neo4j-data:
