apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-telemetry-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-telemetry-service
  template:
    metadata:
      labels:
        app: aegis-telemetry-service
    spec:
      containers:
        - name: telemetry-service
          image: aegis/telemetry-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-telemetry-service
spec:
  selector:
    app: aegis-telemetry-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
