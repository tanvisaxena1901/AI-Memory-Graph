apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-api-gateway
  template:
    metadata:
      labels:
        app: aegis-api-gateway
    spec:
      containers:
        - name: api-gateway
          image: aegis/api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: POSTGRES_R2DBC_URL
              value: r2dbc:postgresql://postgres:5432/aegis
            - name: AI_ENGINE_BASE_URL
              value: http://aegis-ai-engine:8000
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-api-gateway
spec:
  selector:
    app: aegis-api-gateway
  ports:
    - port: 8080
      targetPort: 8080
