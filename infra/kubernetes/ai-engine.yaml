apiVersion: apps/v1
kind: Deployment
metadata:
  name: aegis-ai-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aegis-ai-engine
  template:
    metadata:
      labels:
        app: aegis-ai-engine
    spec:
      containers:
        - name: ai-engine
          image: aegis/ai-engine:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: AEGIS_OPENSEARCH_URL
              value: http://opensearch:9200
            - name: AEGIS_NEO4J_URI
              value: bolt://neo4j:7687
---
apiVersion: v1
kind: Service
metadata:
  name: aegis-ai-engine
spec:
  selector:
    app: aegis-ai-engine
  ports:
    - port: 8000
      targetPort: 8000
