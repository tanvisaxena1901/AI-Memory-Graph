server:
  port: 8080

spring:
  application:
    name: aegis-api-gateway
  r2dbc:
    url: ${POSTGRES_R2DBC_URL:r2dbc:postgresql://localhost:5432/aegis}
    username: ${POSTGRES_USER:aegis}
    password: ${POSTGRES_PASSWORD:aegis}
  sql:
    init:
      mode: always

aegis:
  ai-engine:
    base-url: ${AI_ENGINE_BASE_URL:http://localhost:8000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  pattern:
    level: "%5p traceId=%X{traceId:-} spanId=%X{spanId:-}"
